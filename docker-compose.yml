# ============================================================================
# VERITAS HITL Platform - Docker Compose
# Run everything with: docker-compose up --build
# ============================================================================

version: "3.8"

services:
  # ─── REDIS (Message Broker for Celery) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── FLASK API + FRONTEND ───────────────────────────────────────────────
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_FACTCHECK_API_KEY=${GOOGLE_FACTCHECK_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLASK_ENV=production
      - PORT=5000
    volumes:
      - upload_data:/app/uploads
      - forensic_data:/app/forensic_output
      - results_data:/app/analysis_results
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ─── CELERY WORKER (Background Job Processing) ──────────────────────────
  celery_worker:
    build: .
    command: celery -A tasks worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_FACTCHECK_API_KEY=${GOOGLE_FACTCHECK_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - upload_data:/app/uploads
      - forensic_data:/app/forensic_output
      - results_data:/app/analysis_results
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── CELERY BEAT (Scheduled Tasks - Optional) ───────────────────────────
  celery_beat:
    build: .
    command: celery -A tasks beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  upload_data:
  forensic_data:
  results_data:
